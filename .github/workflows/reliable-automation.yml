name: Daily AI Report - Reliable Automation

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Generate daily report with real content
        run: python scripts/generate_auto_daily.py
        env:
          # 如果有API key，可以在这里设置
          # NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        continue-on-error: true  # 即使失败也不阻止后续步骤
      
      - name: Check if new report was generated
        id: check_report
        run: |
          if git diff --quiet HEAD -- reports/; then
            echo "No new report generated"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "New report generated"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_report.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add -A
          git commit -m "Auto: Daily AI report $(date +%Y-%m-%d)"
          git push
      
      - name: Deploy to GitHub Pages
        if: steps.check_report.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
